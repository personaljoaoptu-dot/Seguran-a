<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisEye AI - Login SaaS</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-950: #020617;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-400: #94a3b8;
            --slate-200: #e2e8f0;
            --white: #ffffff;
            --indigo-500: #6366f1;
            --indigo-600: #4f46e5;
            --cyan-500: #06b6d4;
            --rose-500: #f43f5e;
            
            --glow-indigo: 0 0 25px rgba(99, 102, 241, 0.4);
            --glow-cyan: 0 0 25px rgba(6, 182, 212, 0.4);
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius-lg: 16px;
            --radius-md: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--slate-950);
            color: var(--slate-200);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Neon Glow background blobs */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: 0;
            animation: float 20s infinite alternate;
        }

        .blob-indigo {
            background: var(--indigo-500);
            top: -100px;
            left: -100px;
        }

        .blob-cyan {
            background: var(--cyan-500);
            bottom: -150px;
            right: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        /* Glassmorphic Container */
        .login-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-lg);
            width: 420px;
            padding: 40px;
            z-index: 10;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--indigo-500) 0%, var(--cyan-500) 100%);
            border-radius: 12px;
            color: var(--white);
            margin-bottom: 15px;
            box-shadow: var(--glow-indigo);
        }

        .logo-title {
            font-family: var(--font-heading);
            font-size: 26px;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 13px;
            color: var(--slate-400);
            margin-top: 5px;
        }

        /* Form Inputs */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--slate-400);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            background-color: rgba(2, 6, 23, 0.5);
            border: 1px solid var(--slate-800);
            color: var(--white);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--indigo-500);
            box-shadow: 0 0 0 1px var(--indigo-500), 0 0 10px rgba(99, 102, 241, 0.25);
        }

        /* Error Banner */
        .error-banner {
            background-color: rgba(244, 63, 94, 0.1);
            border: 1px solid var(--rose-500);
            color: var(--rose-500);
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--indigo-600) 0%, var(--indigo-500) 100%);
            border: none;
            color: var(--white);
            padding: 14px;
            border-radius: var(--radius-md);
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--glow-indigo);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--white);
            animation: spin 1s infinite linear;
            display: none;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: var(--slate-700);
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <!-- Background Blobs -->
    <div class="blob blob-indigo"></div>
    <div class="blob blob-cyan"></div>

    <!-- Main Card -->
    <div class="login-card">
        <div class="logo-area">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h1 class="logo-title">AegisEye AI</h1>
            <p class="logo-subtitle">Acesso Restrito ao Painel de Prevenção</p>
        </div>

        <div class="error-banner" id="error-banner">
            Credenciais incorretas.
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="email">E-mail</label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="form-input" placeholder="seu-email@supermercado.com" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span class="spinner" id="btn-spinner"></span>
                <span>Entrar no Sistema</span>
            </button>
        </form>

        <div class="footer-text">
            Protegido por Criptografia e Row-Level Security (RLS)
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const spinner = document.getElementById('btn-spinner');
        const errorBanner = document.getElementById('error-banner');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Feedback
            errorBanner.style.display = 'none';
            submitBtn.disabled = true;
            spinner.style.display = 'inline-block';

            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Save session details
                    sessionStorage.setItem('aegiseye_session_token', data.session_token);
                    sessionStorage.setItem('aegiseye_user_name', data.user_name);
                    sessionStorage.setItem('aegiseye_tenant_id', data.tenant_id);
                    sessionStorage.setItem('aegiseye_tenant_name', data.tenant_name);
                    
                    // Redirect to main panel
                    window.location.href = '/index.html';
                } else {
                    errorBanner.innerText = data.message || 'Credenciais inválidas ou erro no servidor.';
                    errorBanner.style.display = 'block';
                }
            } catch (err) {
                errorBanner.innerText = 'Falha na conexão com o servidor de autenticação.';
                errorBanner.style.display = 'block';
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
