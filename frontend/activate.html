<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisEye AI - Ativar Conta</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-950: #020617;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-400: #94a3b8;
            --slate-200: #e2e8f0;
            --white: #ffffff;
            --indigo-500: #6366f1;
            --indigo-600: #4f46e5;
            --cyan-500: #06b6d4;
            --rose-500: #f43f5e;
            --emerald-500: #10b981;
            
            --glow-indigo: 0 0 25px rgba(99, 102, 241, 0.4);
            --glow-cyan: 0 0 25px rgba(6, 182, 212, 0.4);
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius-lg: 16px;
            --radius-md: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--slate-950);
            color: var(--slate-200);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Neon Glow background blobs */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: 0;
            animation: float 20s infinite alternate;
        }

        .blob-indigo {
            background: var(--indigo-500);
            top: -100px;
            left: -100px;
        }

        .blob-cyan {
            background: var(--cyan-500);
            bottom: -150px;
            right: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        /* Glassmorphic Container */
        .activation-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-lg);
            width: 440px;
            padding: 35px;
            z-index: 10;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, var(--indigo-500) 0%, var(--cyan-500) 100%);
            border-radius: 12px;
            color: var(--white);
            margin-bottom: 12px;
            box-shadow: var(--glow-indigo);
        }

        .logo-title {
            font-family: var(--font-heading);
            font-size: 24px;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 13px;
            color: var(--slate-400);
            margin-top: 4px;
        }

        /* Form Inputs */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--slate-400);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            background-color: rgba(2, 6, 23, 0.5);
            border: 1px solid var(--slate-800);
            color: var(--white);
            padding: 11px 14px;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--indigo-500);
            box-shadow: 0 0 0 1px var(--indigo-500), 0 0 10px rgba(99, 102, 241, 0.25);
        }

        .form-input:disabled {
            background-color: rgba(15, 23, 42, 0.3);
            border-color: rgba(255, 255, 255, 0.03);
            color: var(--slate-400);
            cursor: not-allowed;
        }

        /* Notification Banners */
        .banner {
            border-radius: var(--radius-md);
            padding: 14px;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.4;
            display: none;
        }

        .error-banner {
            background-color: rgba(244, 63, 94, 0.1);
            border: 1px solid var(--rose-500);
            color: var(--rose-500);
        }

        .success-banner {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--emerald-500);
            color: var(--emerald-500);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--indigo-600) 0%, var(--indigo-500) 100%);
            border: none;
            color: var(--white);
            padding: 12px;
            border-radius: var(--radius-md);
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--glow-indigo);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--white);
            animation: spin 1s infinite linear;
            display: none;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--indigo-500);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--cyan-500);
            text-decoration: underline;
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: var(--slate-700);
            margin-top: 25px;
        }

        /* Loading Skeleton */
        .loading-skeleton {
            text-align: center;
            padding: 30px 0;
        }
    </style>
</head>
<body>
    <!-- Background Blobs -->
    <div class="blob blob-indigo"></div>
    <div class="blob blob-cyan"></div>

    <div class="activation-card">
        <div class="logo-area">
            <div class="logo-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h1 class="logo-title">AegisEye AI</h1>
            <p class="logo-subtitle">Configuração de Senha e Ativação de Tenant</p>
        </div>

        <!-- Banners -->
        <div class="banner error-banner" id="error-banner"></div>
        <div class="banner success-banner" id="success-banner"></div>

        <!-- Skeleton Loader -->
        <div class="loading-skeleton" id="loading-spinner">
            <span class="spinner" style="display: inline-block; width: 24px; height: 24px;"></span>
            <p style="margin-top: 10px; font-size: 14px; color: var(--slate-400);">Verificando token de segurança...</p>
        </div>

        <!-- Form (Initially Hidden) -->
        <form id="activate-form" style="display: none;">
            <div class="form-group">
                <label class="form-label" for="email">E-mail Corporativo</label>
                <input type="email" id="email" class="form-input" disabled>
            </div>

            <div class="form-group">
                <label class="form-label" for="empresa">Empresa / Unidade</label>
                <input type="text" id="empresa" class="form-input" disabled>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Definir Senha de Acesso</label>
                <input type="password" id="password" class="form-input" placeholder="Mínimo de 6 caracteres" required minlength="6">
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm-password">Confirmar Senha</label>
                <input type="password" id="confirm-password" class="form-input" placeholder="Repita a senha" required minlength="6">
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span class="spinner" id="btn-spinner"></span>
                <span>Ativar Conta & Acessar</span>
            </button>
        </form>

        <div style="text-align: center;">
            <a href="/login.html" class="back-link">Voltar para a tela de login</a>
        </div>

        <div class="footer-text">
            Conexão Criptografada SSL/TLS Garantida
        </div>
    </div>

    <script>
        // Extract token from URL query params
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const loadingSpinner = document.getElementById('loading-spinner');
        const activateForm = document.getElementById('activate-form');
        const emailInput = document.getElementById('email');
        const empresaInput = document.getElementById('empresa');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const submitBtn = document.getElementById('submit-btn');
        const btnSpinner = document.getElementById('btn-spinner');
        const errorBanner = document.getElementById('error-banner');
        const successBanner = document.getElementById('success-banner');

        // Verify token on load
        async function verifyToken() {
            if (!token) {
                loadingSpinner.style.display = 'none';
                errorBanner.innerText = 'Token de ativação ausente. Por favor, verifique o link recebido.';
                errorBanner.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`/api/verify-token?token=${token}`);
                const data = await response.json();

                loadingSpinner.style.display = 'none';

                if (response.ok && data.success) {
                    // Populate email and company
                    emailInput.value = data.email;
                    empresaInput.value = data.nome_empresa;
                    activateForm.style.display = 'block';
                } else {
                    errorBanner.innerText = data.message || 'Token de ativação inválido ou expirado.';
                    errorBanner.style.display = 'block';
                }
            } catch (err) {
                loadingSpinner.style.display = 'none';
                errorBanner.innerText = 'Erro de comunicação ao verificar token.';
                errorBanner.style.display = 'block';
                console.error(err);
            }
        }

        // Form Submit Handler
        activateForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            errorBanner.style.display = 'none';
            successBanner.style.display = 'none';

            // Match Passwords
            if (password !== confirmPassword) {
                errorBanner.innerText = 'As senhas digitadas não coincidem.';
                errorBanner.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            btnSpinner.style.display = 'inline-block';

            try {
                const response = await fetch('/api/activate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    successBanner.innerText = 'Conta ativada com sucesso! Redirecionando para a tela de login...';
                    successBanner.style.display = 'block';
                    activateForm.style.display = 'none';
                    
                    // Redirect to login screen after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 3000);
                } else {
                    errorBanner.innerText = data.message || 'Falha ao ativar a conta.';
                    errorBanner.style.display = 'block';
                    submitBtn.disabled = false;
                    btnSpinner.style.display = 'none';
                }
            } catch (err) {
                errorBanner.innerText = 'Erro ao conectar ao servidor de ativação.';
                errorBanner.style.display = 'block';
                submitBtn.disabled = false;
                btnSpinner.style.display = 'none';
                console.error(err);
            }
        });

        // Initialize
        verifyToken();
    </script>
</body>
</html>
